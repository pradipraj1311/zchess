<!DOCTYPE html>
<html>
<head>
<title>ZChess</title>

<style>
body {
    margin:0;
        font-family:Arial;
            background:linear-gradient(180deg,#1f2a38,#0e141b);
                color:white;
                }

                header {
                    display:flex;
                        justify-content:space-between;
                            align-items:center;
                                padding:15px 20px;
                                    background:#121a23;
                                    }

                                    header h2 {
                                        margin:0;
                                        }

                                        button {
                                            padding:12px;
                                                margin:10px 0;
                                                    width:90%;
                                                        max-width:400px;
                                                            border:none;
                                                                border-radius:10px;
                                                                    font-size:18px;
                                                                        cursor:pointer;
                                                                            background:#2d7ef7;
                                                                                color:white;
                                                                                }

                                                                                .center {
                                                                                    display:flex;
                                                                                        flex-direction:column;
                                                                                            align-items:center;
                                                                                                margin-top:50px;
                                                                                                }
                                                                                                </style>
                                                                                                </head>

                                                                                                <body>

                                                                                                <header>
                                                                                                    <h2>ZChess</h2>
                                                                                                        <button onclick="showLogin()">Login</button>
                                                                                                        </header>

                                                                                                        <div class="center">
                                                                                                            <button onclick="startGame()">Play Local Game</button>
                                                                                                            </div>

                                                                                                            <script>

                                                                                                            function startGame(){
                                                                                                                window.location.href="game.html";
                                                                                                                }

                                                                                                                function showLogin(){

                                                                                                                    const username = prompt("Username:");
                                                                                                                        const password = prompt("Password:");

                                                                                                                            fetch("/api/user/login?username="+username+"&password="+password,{
                                                                                                                                    method:"POST"
                                                                                                                                        })
                                                                                                                                            .then(res=>res.json())
                                                                                                                                                .then(data=>{
                                                                                                                                                        if(data && data.id){
                                                                                                                                                                    alert("Login Successful");
                                                                                                                                                                            } else {
                                                                                                                                                                                        alert("Invalid Login");
                                                                                                                                                                                                }
                                                                                                                                                                                                    });
                                                                                                                                                                                                    }
                                                                                                                                                                                                    </script>

                                                                                                                                                                                                    </body>
                                                                                                                                                                                                    </html>
