<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZChess</title>

<style>
body{
    font-family:Arial;
        text-align:center;
            background:#eee;
            }
            #board{
                display:grid;
                    grid-template-columns:repeat(8,70px);
                        width:560px;
                            margin:20px auto;
                            }
                            .square{
                                width:70px;
                                    height:70px;
                                        display:flex;
                                            align-items:center;
                                                justify-content:center;
                                                }
                                                .light{ background:#f0d9b5; }
                                                .dark{ background:#769656; }

                                                .square img{
                                                    width:55px;
                                                        height:55px;
                                                            cursor:pointer;
                                                            }
                                                            button{
                                                                padding:10px 15px;
                                                                    margin:5px;
                                                                        font-size:16px;
                                                                        }
                                                                        </style>
                                                                        </head>

                                                                        <body>

                                                                        <h1>ZChess</h1>

                                                                        <button onclick="createGame()">Create Game</button>
                                                                        <button onclick="undoMove()">Undo</button>

                                                                        <h2 id="turn">Turn:</h2>

                                                                        <div id="board"></div>

                                                                        <script>
                                                                        let gameId=null;
                                                                        let selected=null;
                                                                        let turnBeforeMove=null;

                                                                        /* =========================
                                                                           CREATE GAME
                                                                           ========================= */
                                                                           function createGame(){
                                                                               fetch("/game/create",{method:"POST"})
                                                                                   .then(r=>r.json())
                                                                                       .then(g=>{
                                                                                               gameId=g.id;
                                                                                                       load();
                                                                                                           });
                                                                                                           }

                                                                                                           /* =========================
                                                                                                              LOAD BOARD
                                                                                                              ========================= */
                                                                                                              function load(){
                                                                                                                  if(!gameId) return;

                                                                                                                      fetch("/game/"+gameId)
                                                                                                                          .then(r=>r.json())
                                                                                                                              .then(g=>{
                                                                                                                                      drawBoard(g.boardState.split(","));
                                                                                                                                              document.getElementById("turn").innerText="Turn: "+g.currentTurn;
                                                                                                                                                  });
                                                                                                                                                  }

                                                                                                                                                  /* =========================
                                                                                                                                                     DRAW BOARD
                                                                                                                                                     ========================= */
                                                                                                                                                     function drawBoard(board){

                                                                                                                                                         const el=document.getElementById("board");
                                                                                                                                                             el.innerHTML="";

                                                                                                                                                                 board.forEach((p,i)=>{

                                                                                                                                                                         const sq=document.createElement("div");
                                                                                                                                                                                 sq.className="square "+(((Math.floor(i/8)+i)%2)?"dark":"light");

                                                                                                                                                                                         if(p!=="."){
                                                                                                                                                                                                     const img=document.createElement("img");
                                                                                                                                                                                                                 img.src="/pieces/"+p+".svg";
                                                                                                                                                                                                                             sq.appendChild(img);
                                                                                                                                                                                                                                     }

                                                                                                                                                                                                                                             sq.onclick=()=>clickSquare(i);
                                                                                                                                                                                                                                                     el.appendChild(sq);
                                                                                                                                                                                                                                                         });
                                                                                                                                                                                                                                                         }

                                                                                                                                                                                                                                                         /* =========================
                                                                                                                                                                                                                                                            CLICK
                                                                                                                                                                                                                                                            ========================= */
                                                                                                                                                                                                                                                            function clickSquare(i){

                                                                                                                                                                                                                                                                if(selected===null){
                                                                                                                                                                                                                                                                        selected=i;
                                                                                                                                                                                                                                                                                return;
                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                        move(selected,i);
                                                                                                                                                                                                                                                                                            selected=null;
                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                            /* =========================
                                                                                                                                                                                                                                                                                               MOVE
                                                                                                                                                                                                                                                                                               ========================= */
                                                                                                                                                                                                                                                                                               function move(from,to){

                                                                                                                                                                                                                                                                                                   if(!gameId) return;

                                                                                                                                                                                                                                                                                                       fetch("/game/"+gameId)
                                                                                                                                                                                                                                                                                                           .then(r=>r.json())
                                                                                                                                                                                                                                                                                                               .then(g=>{
                                                                                                                                                                                                                                                                                                                       turnBeforeMove=g.currentTurn;

                                                                                                                                                                                                                                                                                                                               fetch(`/move/${gameId}?from=${from}&to=${to}`,{method:"POST"})
                                                                                                                                                                                                                                                                                                                                       .then(r=>r.json())
                                                                                                                                                                                                                                                                                                                                               .then(res=>{

                                                                                                                                                                                                                                                                                                                                                           /* illegal move */
                                                                                                                                                                                                                                                                                                                                                                       if(res.currentTurn===turnBeforeMove){
                                                                                                                                                                                                                                                                                                                                                                                       alert("Illegal move");
                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                               /* checkmate */
                                                                                                                                                                                                                                                                                                                                                                                                                           if(res.checkmate===true){
                                                                                                                                                                                                                                                                                                                                                                                                                                           alert("CHECKMATE");
                                                                                                                                                                                                                                                                                                                                                                                                                                                       }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                   /* check */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if(res.check===true){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               alert("CHECK");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       load();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   /* =========================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      UNDO
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ========================= */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function undoMove(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if(!gameId) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fetch("/move/undo/"+gameId,{method:"POST"})
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .then(()=>load());
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </html>
