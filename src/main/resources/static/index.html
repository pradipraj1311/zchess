<!DOCTYPE html>
<html>
<head>
<title>ZChess</title>
<style>
body{font-family:Arial;text-align:center}
.board{display:grid;grid-template-columns:repeat(8,70px);width:560px;margin:auto}
.cell{width:70px;height:70px}
.white{background:#f0d9b5}
.black{background:#769656}
img{width:60px}
</style>
</head>
<body>

<h1>ZChess</h1>
<button onclick="create()">Create Game</button>
<button onclick="undo()">Undo</button>
<h2 id="turn"></h2>
<div class="board" id="board"></div>

<script>
let gameId=1;
let selected=null;

function create(){
 fetch("/api/create",{method:"POST"})
  .then(r=>r.json())
   .then(g=>{
     gameId=g.id;
       draw(g);
        });
        }

        function undo(){
         fetch(`/api/undo/${gameId}`,{method:"POST"})
          .then(r=>r.json()).then(draw);
          }

          function move(to){
           if(!selected){selected=to;return;}

            let from=selected;
             selected=null;

              fetch(`/api/move/${gameId}?from=${from}&to=${to}`,{method:"POST"})
               .then(r=>r.json()).then(draw);
               }

               function draw(g){
                document.getElementById("turn").innerText="Turn: "+g.currentTurn;
                 let b=g.boardState.split(",");
                  let html="";

                   for(let i=0;i<64;i++){
                     let c=(Math.floor(i/8)+i)%2==0?"white":"black";
                       let pos=String.fromCharCode(97+(i%8))+(8-Math.floor(i/8));
                         let p=b[i];

                           html+=`<div class="cell ${c}" onclick="move('${pos}')">`;

                             if(p!=".")
                                 html+=`<img src="/pieces/${p}.svg">`;

                                   html+="</div>";
                                    }

                                     document.getElementById("board").innerHTML=html;
                                     }
                                     </script>
                                     </body>
                                     </html>
