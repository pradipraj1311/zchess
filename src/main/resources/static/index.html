<!DOCTYPE html>
<html>
<head>
<title>ZChess</title>

<style>
body {
    margin:0;
        background:#1e1e1e;
            color:white;
                font-family:Arial;
                    display:flex;
                        flex-direction:column;
                            align-items:center;
                            }

                            h1 { margin-top:20px; }

                            #board {
                                display:grid;
                                    grid-template-columns: repeat(8, 70px);
                                        margin-top:20px;
                                        }

                                        .square {
                                            width:70px;
                                                height:70px;
                                                    display:flex;
                                                        align-items:center;
                                                            justify-content:center;
                                                            }

                                                            .light { background:#f0d9b5; }
                                                            .dark  { background:#b58863; }

                                                            img {
                                                                width:60px;
                                                                }
                                                                button {
                                                                    padding:10px 20px;
                                                                        font-size:16px;
                                                                            margin-top:10px;
                                                                                cursor:pointer;
                                                                                }
                                                                                </style>
                                                                                </head>

                                                                                <body>

                                                                                <h1>ZChess</h1>

                                                                                <button onclick="createGame()">Create Game</button>

                                                                                <h3 id="turn">Turn: -</h3>

                                                                                <div id="board"></div>

                                                                                <script>

                                                                                function createGame(){
                                                                                    fetch("/api/game/create", { method:"POST" })
                                                                                        .then(res=>res.json())
                                                                                            .then(data=>{
                                                                                                    document.getElementById("turn").innerText =
                                                                                                                "Turn: " + data.currentTurn;
                                                                                                                        renderBoard(data.board);
                                                                                                                            });
                                                                                                                            }

                                                                                                                            function renderBoard(boardString){

                                                                                                                                const board=document.getElementById("board");
                                                                                                                                    board.innerHTML="";

                                                                                                                                        const squares=boardString.split(",");

                                                                                                                                            for(let i=0;i<64;i++){

                                                                                                                                                    const square=document.createElement("div");
                                                                                                                                                            square.classList.add("square");

                                                                                                                                                                    if((Math.floor(i/8)+i)%2===0)
                                                                                                                                                                                square.classList.add("light");
                                                                                                                                                                                        else
                                                                                                                                                                                                    square.classList.add("dark");

                                                                                                                                                                                                            const piece=squares[i];

                                                                                                                                                                                                                    if(piece!=="."){
                                                                                                                                                                                                                                const img=document.createElement("img");
                                                                                                                                                                                                                                            img.src="/pieces/"+piece+".svg";
                                                                                                                                                                                                                                                        square.appendChild(img);
                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                        board.appendChild(square);
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                            </html>
