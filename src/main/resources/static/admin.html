<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zChess Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="navbar">
    <h1>♔ zChess Admin</h1>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('dashboard', this)">Dashboard</button>
            <button class="nav-tab"        onclick="showTab('users', this)">Users</button>
            <button class="nav-tab"        onclick="showTab('games', this)">Games</button>
            <button class="nav-tab"        onclick="showTab('ratings', this)">Ratings</button>
        </div>
        <button class="logout-btn" onclick="logout()">⏏ Logout</button>
    </div>
</div>

<div class="main">

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="section active">
        <div class="stats">
            <div class="stat-card"><h3 id="totalUsers">-</h3><p>Total Users</p></div>
            <div class="stat-card"><h3 id="totalGames">-</h3><p>Total Games</p></div>
            <div class="stat-card"><h3 id="ongoingGames">-</h3><p>Ongoing</p></div>
            <div class="stat-card"><h3 id="completedGames">-</h3><p>Completed</p></div>
        </div>
    </div>

    <!-- USERS -->
    <div id="tab-users" class="section">
        <h2>Register New User / Admin</h2>
        <div class="reg-form">
            <input id="newUsername" placeholder="Username" autocomplete="off">
            <input id="newPassword" type="password" placeholder="Password">
            <select id="newRole">
                <option value="USER">Player (USER)</option>
                <option value="ADMIN">Admin (ADMIN)</option>
            </select>
            <button class="btn-register" onclick="registerUser()">Register</button>
        </div>
        <h2>All Users</h2>
        <div class="table-wrap">
            <table>
                <thead><tr><th>ID</th><th>Username</th><th>Role</th><th>Action</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>

    <!-- GAMES -->
    <div id="tab-games" class="section">
        <h2>All Games</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>White</th><th>Black</th><th>Status</th><th>Turn</th><th>Created</th><th>Action</th></tr>
                </thead>
                <tbody id="gamesTable"></tbody>
            </table>
        </div>
    </div>

    <!-- RATINGS -->
    <div id="tab-ratings" class="section">
        <h2>Leaderboard</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>#</th><th>Username</th><th>Rating</th><th>Wins</th><th>Losses</th><th>Draws</th><th>Games</th></tr>
                </thead>
                <tbody id="ratingsTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const authHeader = sessionStorage.getItem("authHeader");
    if (!authHeader) { alert("Not logged in!"); window.location.href = "/chess.html"; }

    window.onload = () => { loadStats(); };

    function logout() {
        sessionStorage.clear();
        window.location.href = "/chess.html";
    }

    function showTab(tab, btn) {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");
        btn.classList.add("active");
        if (tab === 'users')   loadUsers();
        if (tab === 'games')   loadGames();
        if (tab === 'ratings') loadRatings();
        if (tab === 'dashboard') loadStats();
    }

    function loadStats() {
        fetch("/api/users", { headers: { "Authorization": authHeader } })
            .then(r => r.json()).then(u => document.getElementById("totalUsers").innerText = u.length)
            .catch(() => {});

        fetch("/api/games", { headers: { "Authorization": authHeader } })
            .then(r => r.json()).then(games => {
                document.getElementById("totalGames").innerText = games.length;
                document.getElementById("ongoingGames").innerText   = games.filter(g => g.status === "Ongoing").length;
                document.getElementById("completedGames").innerText = games.filter(g => g.status !== "Ongoing").length;
            }).catch(() => {});
    }

    function registerUser() {
        const username = document.getElementById("newUsername").value.trim();
        const password = document.getElementById("newPassword").value.trim();
        const role     = document.getElementById("newRole").value;
        if (!username || !password) { alert("Fill all fields!"); return; }
        fetch("/api/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": authHeader },
            body: JSON.stringify({ username, password, role })
        })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(() => {
            alert("User registered!");
            document.getElementById("newUsername").value = "";
            document.getElementById("newPassword").value = "";
            loadStats();
        })
        .catch(() => alert("Failed! Username may already exist."));
    }

    function loadUsers() {
        fetch("/api/users", { headers: { "Authorization": authHeader } })
        .then(r => r.json()).then(users => {
            const tb = document.getElementById("usersTable");
            tb.innerHTML = "";
            users.forEach(u => {
                tb.innerHTML += `<tr>
                    <td>${u.id}</td><td>${u.username}</td>
                    <td><span class="badge ${u.role==='ADMIN'?'badge-admin':'badge-user'}">${u.role}</span></td>
                    <td><button class="btn-del" onclick="deleteUser(${u.id})">Delete</button></td>
                </tr>`;
            });
        });
    }

    function deleteUser(id) {
        if (!confirm("Delete this user?")) return;
        fetch(`/api/users/${id}`, { method: "DELETE", headers: { "Authorization": authHeader } })
        .then(() => { loadUsers(); loadStats(); });
    }

    function loadGames() {
        fetch("/api/games", { headers: { "Authorization": authHeader } })
        .then(r => r.json()).then(games => {
            const tb = document.getElementById("gamesTable");
            tb.innerHTML = "";
            games.forEach(g => {
                const statusClass = g.status === 'Ongoing' ? 'badge-ongoing'
                                  : g.status === 'White Won' ? 'badge-white'
                                  : g.status === 'Black Won' ? 'badge-black'
                                  : 'badge-draw';
                tb.innerHTML += `<tr>
                    <td>${g.id}</td>
                    <td>${g.playerWhite ? g.playerWhite.username : '-'}</td>
                    <td>${g.playerBlack ? g.playerBlack.username : '-'}</td>
                    <td><span class="badge ${statusClass}">${g.status}</span></td>
                    <td>${g.currentTurn}</td>
                    <td>${g.createdAt ? g.createdAt.substring(0,10) : '-'}</td>
                    <td><button class="btn-del" onclick="deleteGame(${g.id})">Delete</button></td>
                </tr>`;
            });
        });
    }

    function deleteGame(id) {
        if (!confirm("Delete this game?")) return;
        fetch(`/api/games/${id}`, { method: "DELETE", headers: { "Authorization": authHeader } })
        .then(() => { loadGames(); loadStats(); });
    }

    function loadRatings() {
        fetch("/api/ratings", { headers: { "Authorization": authHeader } })
        .then(r => r.json()).then(ratings => {
            const tb = document.getElementById("ratingsTable");
            tb.innerHTML = "";
            ratings.forEach((r, i) => {
                const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
                const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
                tb.innerHTML += `<tr class="${rankClass}">
                    <td>${medal}</td>
                    <td>${r.user ? r.user.username : '-'}</td>
                    <td><strong>${r.rating}</strong></td>
                    <td>${r.wins}</td><td>${r.losses}</td>
                    <td>${r.draws}</td><td>${r.gamesPlayed}</td>
                </tr>`;
            });
        }).catch(() => {
            document.getElementById("ratingsTable").innerHTML =
                "<tr><td colspan='7' style='color:#aaa;text-align:center;padding:20px'>No ratings yet</td></tr>";
        });
    }
</script>
</body>
</html>
