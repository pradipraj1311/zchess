<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zChess</title>
    <link rel="stylesheet" href="chess.css">
</head>
<body>

<!-- ROLE SCREEN -->
<div id="roleScreen" class="center">
    <h1>♔ zChess</h1>
    <button class="btn btn-gold"  onclick="selectRole('player')">🎮 Player</button>
    <button class="btn btn-green" onclick="selectRole('admin')">🛡 Admin</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="center hidden">
    <h2 id="loginTitle">Player Login</h2>
    <input id="username" placeholder="Username" autocomplete="off">
    <input id="password" type="password" placeholder="Password">
    <button class="btn btn-gold"  onclick="login()">Login</button>
    <button id="registerBtn" class="btn btn-green" onclick="register()">Register</button>
    <button class="btn btn-grey"  onclick="goBack()">← Back</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">

    <div class="top-bar">
        <h2 id="turn">Turn: white</h2>
        <div class="user-info">
            <span class="username-lbl" id="usernameLabel"></span>
            <span class="rating-badge">⭐ <span id="ratingDisplay">1000</span></span>
        </div>
    </div>

    <div class="container">

        <div id="board"></div>

        <div class="side">
            <div>
                <h3>White Moves</h3>
                <ul class="move-list" id="whiteHistory"></ul>
            </div>
            <div>
                <h3>Black Moves</h3>
                <ul class="move-list" id="blackHistory"></ul>
            </div>
            <div class="btn-row">
                <button class="btn-sm btn-reset" onclick="resetGame()">Reset</button>
                <button class="btn-sm btn-undo"  onclick="undoMove()">Undo</button>
            </div>
            <div class="timer-card">
                <h3>Timer</h3>
                <div class="timer-row">White <span id="whiteTimer">10:00</span></div>
                <div class="timer-row">Black <span id="blackTimer">10:00</span></div>
            </div>
        </div>

    </div>
</div>

<script src="chess.js"></script>
</body>
</html>
