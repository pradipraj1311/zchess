<!DOCTYPE html>
<html>
<head>
    <title>zChess</title>
    <link rel="stylesheet" href="chess.css">
</head>
<body>

<!-- ROLE SCREEN -->
<div id="roleScreen" class="center">
    <h1>zChess</h1>
    <button onclick="selectRole('player')">Player</button>
    <button onclick="selectRole('admin')">Admin</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="center hidden">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">

    <div class="top-bar">
        <h2 id="turn">Turn: white</h2>
    </div>

    <div class="container">

        <!-- BOARD -->
        <div id="board"></div>

        <!-- SIDE PANEL -->
        <div class="side">

            <h3>White Moves</h3>
            <ul id="whiteHistory"></ul>

            <h3>Black Moves</h3>
            <ul id="blackHistory"></ul>

            <button onclick="resetGame()">Reset</button>
            <button onclick="undoMove()">Undo</button>

            <h3>Timer</h3>
            <p>White: <span id="whiteTimer">10:00</span></p>
            <p>Black: <span id="blackTimer">10:00</span></p>

        </div>

    </div>

</div>

<script src="chess.js"></script>
</body>
</html>
