<!DOCTYPE html>
<html>
<head>
    <title>ZChess</title>

        <style>
                body{
                            font-family: Arial;
                                        text-align:center;
                                                    background:#eee;
                                                            }

                                                                    h1{
                                                                                margin-top:20px;
                                                                                        }

                                                                                                button{
                                                                                                            padding:8px 15px;
                                                                                                                        margin:10px;
                                                                                                                                    cursor:pointer;
                                                                                                                                            }

                                                                                                                                                    #board{
                                                                                                                                                                display:grid;
                                                                                                                                                                            grid-template-columns:repeat(8,70px);
                                                                                                                                                                                        width:560px;
                                                                                                                                                                                                    margin:20px auto;
                                                                                                                                                                                                            }

                                                                                                                                                                                                                    .cell{
                                                                                                                                                                                                                                width:70px;
                                                                                                                                                                                                                                            height:70px;
                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                            .white{
                                                                                                                                                                                                                                                                        background:#f0d9b5;
                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                        .black{
                                                                                                                                                                                                                                                                                                    background:#769656;
                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                    img{
                                                                                                                                                                                                                                                                                                                                width:100%;
                                                                                                                                                                                                                                                                                                                                            height:100%;
                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                        </head>

                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                        <h1>ZChess</h1>

                                                                                                                                                                                                                                                                                                                                                        <button onclick="createGame()">Create Game</button>
                                                                                                                                                                                                                                                                                                                                                        <button onclick="undo()">Undo</button>

                                                                                                                                                                                                                                                                                                                                                        <h3 id="turn">Turn: -</h3>

                                                                                                                                                                                                                                                                                                                                                        <div id="board"></div>

                                                                                                                                                                                                                                                                                                                                                        <script>

                                                                                                                                                                                                                                                                                                                                                        let gameId = null;
                                                                                                                                                                                                                                                                                                                                                        let selected = null;

                                                                                                                                                                                                                                                                                                                                                        // ===============================
                                                                                                                                                                                                                                                                                                                                                        // CREATE GAME
                                                                                                                                                                                                                                                                                                                                                        // ===============================

                                                                                                                                                                                                                                                                                                                                                        function createGame(){
                                                                                                                                                                                                                                                                                                                                                            fetch("/api/game/create")
                                                                                                                                                                                                                                                                                                                                                                .then(response => response.json())
                                                                                                                                                                                                                                                                                                                                                                    .then(game => {
                                                                                                                                                                                                                                                                                                                                                                            gameId = game.id;
                                                                                                                                                                                                                                                                                                                                                                                    loadGame();
                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                            .catch(err => {
                                                                                                                                                                                                                                                                                                                                                                                                    console.log("Create error:", err);
                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                        // ===============================
                                                                                                                                                                                                                                                                                                                                                                                                        // LOAD GAME
                                                                                                                                                                                                                                                                                                                                                                                                        // ===============================

                                                                                                                                                                                                                                                                                                                                                                                                        function loadGame(){

                                                                                                                                                                                                                                                                                                                                                                                                            if(gameId == null) return;

                                                                                                                                                                                                                                                                                                                                                                                                                fetch("/api/game/" + gameId)
                                                                                                                                                                                                                                                                                                                                                                                                                    .then(response => response.json())
                                                                                                                                                                                                                                                                                                                                                                                                                        .then(game => {

                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("turn").innerText =
                                                                                                                                                                                                                                                                                                                                                                                                                                            "Turn: " + game.turn;

                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(game.check){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("CHECK!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(game.checkmate){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert("CHECKMATE!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const boardDiv = document.getElementById("board");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    boardDiv.innerHTML = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const boardArray = game.board.split(",");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    boardArray.forEach((piece, index) => {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const cell = document.createElement("div");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const row = Math.floor(index / 8);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const col = index % 8;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if((row + col) % 2 === 0){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cell.className = "cell white";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cell.className = "cell black";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(piece !== "."){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const img = document.createElement("img");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        img.src = "/pieces/" + piece + ".svg";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cell.appendChild(img);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cell.onclick = function(){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(selected === null){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    selected = index;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        move(selected, index);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            selected = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    boardDiv.appendChild(cell);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .catch(err => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log("Load error:", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // ===============================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // MOVE
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // ===============================

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function move(from, to){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(gameId == null) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetch(`/api/game/move/${gameId}?from=${from}&to=${to}`,{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                method: "POST"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .then(response => response.json())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .then(game => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadGame();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .catch(err => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    console.log("Move error:", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // ===============================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // UNDO
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // ===============================

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function undo(){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(gameId == null) return;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fetch(`/api/game/undo/${gameId}`,{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        method:"POST"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .then(response => response.json())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .then(game => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            loadGame();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .catch(err => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log("Undo error:", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
