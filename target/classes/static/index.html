<!DOCTYPE html>
<html>
<head>
    <title>ZChess</title>

        <style>
                body{
                            font-family: Arial;
                                        text-align:center;
                                                    background:#eee;
                                                            }

                                                                    h1{
                                                                                margin-top:20px;
                                                                                        }

                                                                                                table{
                                                                                                            border-collapse:collapse;
                                                                                                                        margin:auto;
                                                                                                                                    margin-top:20px;
                                                                                                                                            }

                                                                                                                                                    td{
                                                                                                                                                                width:70px;
                                                                                                                                                                            height:70px;
                                                                                                                                                                                        text-align:center;
                                                                                                                                                                                                    vertical-align:middle;
                                                                                                                                                                                                            }

                                                                                                                                                                                                                    .light{ background:#f0d9b5; }
                                                                                                                                                                                                                            .dark{ background:#769656; }

                                                                                                                                                                                                                                    img{
                                                                                                                                                                                                                                                width:60px;
                                                                                                                                                                                                                                                            height:60px;
                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                            button{
                                                                                                                                                                                                                                                                                        padding:10px 20px;
                                                                                                                                                                                                                                                                                                    font-size:16px;
                                                                                                                                                                                                                                                                                                                margin-top:15px;
                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                                                                                                                            </head>

                                                                                                                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                                                                                                            <h1>ZChess</h1>

                                                                                                                                                                                                                                                                                                                            <button onclick="createGame()">Create New Game</button>

                                                                                                                                                                                                                                                                                                                            <table id="board"></table>

                                                                                                                                                                                                                                                                                                                            <script>

                                                                                                                                                                                                                                                                                                                            let gameId = 1;
                                                                                                                                                                                                                                                                                                                            let selected = null;

                                                                                                                                                                                                                                                                                                                            function createGame(){
                                                                                                                                                                                                                                                                                                                                fetch("/api/game/create")
                                                                                                                                                                                                                                                                                                                                    .then(res=>res.json())
                                                                                                                                                                                                                                                                                                                                        .then(data=>{
                                                                                                                                                                                                                                                                                                                                                gameId = data.id;
                                                                                                                                                                                                                                                                                                                                                        loadBoard();
                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                            function loadBoard(){

                                                                                                                                                                                                                                                                                                                                                                fetch("/api/game/" + gameId)
                                                                                                                                                                                                                                                                                                                                                                    .then(res=>res.json())
                                                                                                                                                                                                                                                                                                                                                                        .then(data=>{

                                                                                                                                                                                                                                                                                                                                                                                let rows = data.boardState.split(";");
                                                                                                                                                                                                                                                                                                                                                                                        let board = document.getElementById("board");
                                                                                                                                                                                                                                                                                                                                                                                                board.innerHTML = "";

                                                                                                                                                                                                                                                                                                                                                                                                        for(let i=0;i<8;i++){

                                                                                                                                                                                                                                                                                                                                                                                                                    let tr = document.createElement("tr");
                                                                                                                                                                                                                                                                                                                                                                                                                                let cols = rows[i].split(",");

                                                                                                                                                                                                                                                                                                                                                                                                                                            for(let j=0;j<8;j++){

                                                                                                                                                                                                                                                                                                                                                                                                                                                            let td = document.createElement("td");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if((i+j)%2==0)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                td.className="light";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    td.className="dark";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    td.onclick = () => clickCell(i,j);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let piece = cols[j];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(piece !== "."){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let img = document.createElement("img");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            img.src = "/pieces/" + piece + ".svg";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                td.appendChild(img);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tr.appendChild(td);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        board.appendChild(tr);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function clickCell(row,col){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(selected == null){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                selected = {row,col};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fetch(`/api/game/move?fromRow=${selected.row}&fromCol=${selected.col}&toRow=${row}&toCol=${col}`,{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        method:"POST"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .then(res=>res.json())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .then(data=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            selected=null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        loadBoard();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadBoard();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
