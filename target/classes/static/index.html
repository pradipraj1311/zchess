<!DOCTYPE html>
<html>
<head>
<title>ZChess</title>
<style>
body{font-family:Arial;text-align:center}
table{margin:auto;border-collapse:collapse}
td{width:70px;height:70px}
.light{background:#f0d9b5}
.dark{background:#769656}
img{width:60px}
button{padding:10px;margin:10px}
</style>
</head>
<body>

<h1>ZChess</h1>
<button onclick="createGame()">Create Game</button>
<button onclick="undo()">Undo</button>
<h3 id="turn"></h3>

<table id="board"></table>

<script>
let gameId=1;
let selected=null;

function createGame(){
fetch("/api/game/create",{method:"POST"})
.then(r=>r.json())
.then(g=>{
gameId=g.id;
load();
});
}

function load(){
fetch("/api/game/"+gameId)
.then(r=>r.json())
.then(g=>{
draw(g.boardState);
document.getElementById("turn").innerText="Turn: "+g.currentTurn;
});
}

function draw(state){
let arr=state.split(",");
let html="";
for(let r=0;r<8;r++){
html+="<tr>";
for(let c=0;c<8;c++){
let i=r*8+c;
let piece=arr[i];
let color=(r+c)%2?"dark":"light";
html+=`<td class="${color}" onclick="clickCell(${r},${c})">`;
if(piece!="."){
//html+=`<img src="/pieces/${piece}.svg">`;
html+=`<img src="/pieces/${piece.toLowerCase()}.svg">`;
}
html+="</td>";
}
html+="</tr>";
}
document.getElementById("board").innerHTML=html;
}

function clickCell(r,c){
if(selected==null){
selected=[r,c];
}else{
fetch(`/api/move/${gameId}?fr=${selected[0]}&fc=${selected[1]}&tr=${r}&tc=${c}`,{method:"POST"})
.then(r=>r.json())
.then(()=>load());
selected=null;
}
}

function undo(){
fetch("/api/move/undo/"+gameId,{method:"POST"})
.then(()=>load());
}

createGame();
</script>

</body>
</html>
